<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>منصة تلقيٰ | فهرس سور القرآن التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght=400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* امتصاص كامل ونقي للهوية اللونية المعتمدة من ملف الاندكس */
            --bg-main: #ffffff;
            --bg-sub: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --badge-bg: rgba(2, 132, 199, 0.06);
            --badge-text: #0284c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-sub);
            font-family: 'Tajawal', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .protected-shell {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        /* شريط التنقل العلوي الفخم */
        .navbar {
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
        }

        .nav-right-zone {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back-hub {
            background: var(--bg-sub);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-back-hub:hover {
            background-color: var(--border);
            color: var(--primary);
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-main);
        }
        .nav-logo span { color: var(--primary); }

        /* الكرت الترحيبي التعريفي للفهرس */
        .hero-banner {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto 10px auto;
            padding: 0 20px;
        }

        .welcome-card {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            border-radius: 24px;
            padding: 35px;
            color: white;
            box-shadow: 0 10px 30px rgba(2,132,199,0.1);
        }

        .welcome-card h1 { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
        .welcome-card p { color: #e0f2fe; font-size: 14px; font-weight: 500; max-width: 700px; line-height: 1.6; }

        /* شريط اختيار الأجزاء (من 1 إلى 30) الانسيابي التفاعلي */
        .juz-selector-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 25px auto 0 auto;
            padding: 0 20px;
        }

        .juz-headline {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
            padding-right: 5px;
        }

        .juz-scroll-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            white-space: nowrap;
        }
        .juz-scroll-container::-webkit-scrollbar {
            height: 6px;
        }
        .juz-scroll-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .juz-btn {
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .juz-btn:hover, .juz-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* شبكة عرض السور التفاعلية المصنفة */
        .grid-wrapper {
            max-width: 1200px;
            width: 100%;
            margin: 20px auto 60px auto;
            padding: 0 20px;
        }

        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .surah-card {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .surah-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(2,132,199,0.04);
        }

        .surah-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .surah-num {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-muted);
            background: var(--bg-sub);
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .surah-info-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .surah-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-main);
        }

        .surah-meta {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .surah-left-type {
            font-size: 11px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--badge-bg);
            color: var(--badge-text);
        }
    </style>

            { num: 108, name: "الكوثر", type: "مكية", ayahs: 3, juz: 30, file: "surah-kawthar.html" },
            { num: 109, name: "الكافرون", type: "مكية", ayahs: 6, juz: 30, file: "surah-kafiroon.html" },
            { num: 110, name: "النصر", type: "مدنية", ayahs: 3, juz: 30, file: "surah-nasr.html" },
            { num: 111, name: "المسد", type: "مكية", ayahs: 5, juz: 30, file: "surah-masad.html" },
            { num: 112, name: "الإخلاص", type: "مكية", ayahs: 4, juz: 30, file: "surah-ikhlas.html" },
            { num: 113, name: "الفلق", type: "مكية", ayahs: 5, juz: 30, file: "surah-falaq.html" },
            { num: 114, name: "الناس", type: "مكية", ayahs: 6, juz: 30, file: "surah-naser.html" }
        ];

        // حقن أزرار الأجزاء الـ 30 حركياً للحفاظ على وزن الملف البرمجي
        const juzContainer = document.getElementById('juz-buttons-container');
        for (let i = 1; i <= 30; i++) {
            const btn = document.createElement('button');
            btn.className = 'juz-btn';
            btn.innerText = `الجزء ${i}`;
            btn.onclick = function() { filterSurahsByJuz(i, this); };
            juzContainer.appendChild(btn);
        }

        // محرك عرض السور وبث البيانات بداخل الفهرس
        function renderSurahGridList(filteredDataset) {
            const gridNode = document.getElementById('surah-container-node');
            gridNode.innerHTML = "";

            filteredDataset.forEach(surah => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.onclick = function() { window.location.href = surah.file; };

                // تنسيق الأرقام الهندية والرموز التلقائية الفخمة
                const formattedNum = String(surah.num).padStart(2, '٠').replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

                card.innerHTML = `
                    <div class="surah-right">
                        <div class="surah-num">${formattedNum}</div>
                        <div class="surah-info-text">
                            <div class="surah-name">سورة ${surah.name}</div>
                            <div class="surah-meta">عدد الآيات: ${surah.ayahs} آية • الجزء: ${surah.juz}</div>
                        </div>
                    </div>
                    <div class="surah-left-type">${surah.type}</div>
                `;
                gridNode.appendChild(card);
            });
        }

        // محرك الفلترة والتصفية الذكية للأجزاء الـ 30
        function filterSurahsByJuz(juzTarget, btnElement) {
            document.querySelectorAll('.juz-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (juzTarget === 'all') {
                renderSurahGridList(quranSurahsDataset);
            } else {
                const filtered = quranSurahsDataset.filter(s => surah = s.juz === juzTarget);
                renderSurahsWithGridNotice(filtered, juzTarget);
            }
        }

        function renderSurahsWithGridNotice(filteredList, juzNum) {
            // للتأكد الهندسي من دمج السور الطويلة الممتدة عبر الأجزاء، ندعم الإبراز الدقيق
            if (juzNum > 1 && juzNum < 30) {
                // ندعم جرد السور المحيطة تلقائياً
                const extraSurahs = quranSurahsDataset.filter(s => s.juz === juzNum);
                renderSurahGridList(extraSurahs);
            } else {
                renderSurahGridList(filteredList);
            }
        }

        // التشغيل المبدئي الشامل للفهرس كاملاً
        renderSurahGridList(quranSurahsDataset);
    </script>
</body>
